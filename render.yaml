services:
  - type: web
    name: startup-validator-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn fast_api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.10"
